<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Wellpal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #C8F5E1;
  --mint-mid: #7EDCB0;
  --green-deep: #1A6B4A;
  --green-dark: #0D3D2B;
  --cream: #F9F5EE;
  --warm-white: #FEFCF8;
  --charcoal: #1C1C1E;
  --text-body: #3A3A3C;
  --accent-coral: #FF7F6B;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-body);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden;overflow-y:auto;padding:40px 0;}

/* Background blobs */
.bg-blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.bg-blob.b1{width:500px;height:500px;background:radial-gradient(circle,rgba(126,220,176,0.35),transparent 70%);top:-120px;right:-80px;animation:bfl 8s ease-in-out infinite;}
.bg-blob.b2{width:350px;height:350px;background:radial-gradient(circle,rgba(91,155,213,0.2),transparent 70%);bottom:-60px;left:-60px;animation:bfl 10s ease-in-out infinite reverse;}
.bg-blob.b3{width:250px;height:250px;background:radial-gradient(circle,rgba(232,197,71,0.15),transparent 70%);top:50%;left:50%;animation:bfl 12s ease-in-out infinite;}
@keyframes bfl{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}

/* Auth card */
.auth-container{position:relative;z-index:1;width:min(480px,92vw);}

.auth-card{background:white;border-radius:28px;box-shadow:0 20px 60px rgba(26,107,74,0.15),0 0 0 1px rgba(126,220,176,0.2);overflow:hidden;animation:slideUp 0.5s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Logo */
.auth-logo{text-align:center;padding:36px 24px 0;}
.auth-logo-mark{display:inline-flex;align-items:center;gap:10px;font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--green-deep);}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--mint-mid),var(--green-deep));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.auth-tagline{font-size:0.82rem;color:var(--text-body);opacity:0.5;margin-top:6px;}

/* Tabs */
.auth-tabs{display:flex;margin:24px 24px 0;border-radius:12px;background:var(--cream);padding:4px;gap:4px;}
.auth-tab{flex:1;padding:11px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.25s;background:transparent;color:var(--text-body);opacity:0.6;}
.auth-tab.active{background:white;color:var(--green-deep);opacity:1;box-shadow:0 2px 8px rgba(26,107,74,0.1);}

/* Form */
.auth-form{padding:24px;}
.auth-form-view{display:none;animation:fadeIn 0.3s ease;}
.auth-form-view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.form-group{margin-bottom:16px;}
.form-label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--green-deep);display:block;margin-bottom:6px;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid rgba(126,220,176,0.4);border-radius:12px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;background:var(--warm-white);color:var(--charcoal);transition:border-color 0.2s,box-shadow 0.2s;}
.form-input:focus{border-color:var(--mint-mid);box-shadow:0 0 0 4px rgba(126,220,176,0.15);}
.form-input::placeholder{color:#aaa;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.form-input.error{border-color:var(--accent-coral);box-shadow:0 0 0 4px rgba(255,127,107,0.1);}

/* Password visibility */
.input-wrap{position:relative;}
.input-wrap .form-input{padding-right:44px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;opacity:0.5;transition:opacity 0.2s;}
.pw-toggle:hover{opacity:0.8;}

/* Submit */
.auth-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-deep),#2a8a5e);color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 16px rgba(26,107,74,0.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,107,74,0.4);}
.auth-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;}

/* Loading spinner */
.spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;}
.auth-submit.loading .spinner{display:block;}
.auth-submit.loading .btn-text{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Error/success messages */
.auth-msg{padding:10px 14px;border-radius:10px;font-size:0.82rem;font-weight:500;margin-bottom:14px;display:none;align-items:center;gap:8px;animation:fadeIn 0.3s ease;}
.auth-msg.show{display:flex;}
.auth-msg.error{background:#FFF0EE;color:#c0392b;border:1px solid rgba(255,127,107,0.3);}
.auth-msg.success{background:#F0FFF4;color:var(--green-deep);border:1px solid rgba(126,220,176,0.4);}

/* Divider */
.auth-divider{display:flex;align-items:center;gap:14px;margin:20px 0;font-size:0.78rem;color:#aaa;text-transform:uppercase;letter-spacing:0.08em;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(126,220,176,0.3),transparent);}

/* Skip / Guest */
.auth-skip{display:block;text-align:center;color:var(--green-deep);font-size:0.85rem;font-weight:500;text-decoration:none;padding:8px;transition:opacity 0.2s;opacity:0.7;}
.auth-skip:hover{opacity:1;text-decoration:underline;}

/* Footer */
.auth-footer{text-align:center;padding:16px 24px 24px;font-size:0.78rem;color:#aaa;}
.auth-footer a{color:var(--green-deep);text-decoration:none;font-weight:600;}

/* Health tip */
.health-tip{margin-top:20px;text-align:center;padding:0 10px;}
.health-tip p{font-size:0.78rem;color:var(--text-body);opacity:0.45;line-height:1.5;font-style:italic;}
</style>
</head>
<body>

<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<div class="auth-container">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <div class="auth-logo-icon">🌿</div>
        Wellpal
      </div>
      <p class="auth-tagline">Your Intelligent Health Companion</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Create Account</button>
    </div>

    <!-- Forms -->
    <div class="auth-form">

      <!-- ═══ LOGIN ═══ -->
      <div class="auth-form-view active" id="loginView">
        <div class="auth-msg" id="loginMsg"></div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            <button class="pw-toggle" type="button" onclick="togglePw(this)">👁️</button>
          </div>
        </div>
        <button class="auth-submit" id="loginBtn" onclick="handleLogin()">
          <span class="btn-text">Sign In →</span>
          <div class="spinner"></div>
        </button>

        <div class="auth-divider">or</div>
        <a href="wellpal-v5-updated (2).html" class="auth-skip">Continue as Guest →</a>
      </div>

      <!-- ═══ REGISTER ═══ -->
      <div class="auth-form-view" id="registerView">
        <div class="auth-msg" id="regMsg"></div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="regName" placeholder="Your full name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="regPassword" placeholder="Minimum 6 characters" autocomplete="new-password">
            <button class="pw-toggle" type="button" onclick="togglePw(this)">👁️</button>
          </div>
        </div>

        <details style="margin-bottom:12px;cursor:pointer;">
          <summary style="font-size:0.82rem;font-weight:600;color:var(--green-deep);padding:6px 0;">➕ Add Health Details (Optional)</summary>
          <div style="padding-top:12px;">
            <div class="form-row" style="margin-bottom:12px;">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Age</label>
                <input class="form-input" type="number" id="regAge" placeholder="e.g. 32" min="1" max="120">
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Gender</label>
                <select class="form-input" id="regGender">
                  <option value="Prefer not to say">Prefer not to say</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Non-binary">Non-binary</option>
                </select>
              </div>
            </div>
            <div class="form-row" style="margin-bottom:12px;">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Height</label>
                <input class="form-input" type="text" id="regHeight" placeholder="e.g. 5'10&quot;">
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Weight</label>
                <input class="form-input" type="text" id="regWeight" placeholder="e.g. 74 kg">
              </div>
            </div>
            <div class="form-row" style="margin-bottom:12px;">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Blood Type</label>
                <select class="form-input" id="regBlood">
                  <option value="Unknown">Unknown</option>
                  <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                  <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
                </select>
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Location</label>
                <input class="form-input" type="text" id="regLocation" placeholder="City, State">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" style="color:var(--accent-coral);">⚠️ Allergies</label>
              <input class="form-input" type="text" id="regAllergies" placeholder="Comma separated: Nuts, Penicillin...">
            </div>
          </div>
        </details>

        <button class="auth-submit" id="regBtn" onclick="handleRegister()">
          <span class="btn-text">Create Account →</span>
          <div class="spinner"></div>
        </button>

        <div class="auth-divider">or</div>
        <a href="wellpal-v5-updated (2).html" class="auth-skip">Continue as Guest →</a>
      </div>
    </div>

    <div class="auth-footer">
      By continuing, you agree to Wellpal's <a href="#">Terms</a> & <a href="#">Privacy Policy</a>
    </div>
  </div>

  <div class="health-tip">
    <p>💡 "An apple a day keeps the doctor away" — but a check-up once a year keeps you in the clear!</p>
  </div>
</div>

<script src="auth.js"></script>
<script>
// If already logged in, redirect to home
if (WellpalAuth.isLoggedIn()) {
  window.location.href = 'wellpal-v5-updated (2).html';
}

// ── Tab switching ──
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form-view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab === 'login' ? 'loginView' : 'registerView').classList.add('active');
    // Clear messages
    hideMsg('loginMsg'); hideMsg('regMsg');
  });
});

// ── Toggle password visibility ──
function togglePw(btn) {
  const input = btn.previousElementSibling;
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁️'; }
}

// ── Message helpers ──
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'auth-msg show ' + type;
  el.innerHTML = (type === 'error' ? '⚠️ ' : '✅ ') + text;
}
function hideMsg(id) {
  const el = document.getElementById(id);
  if (el) { el.className = 'auth-msg'; el.innerHTML = ''; }
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

// ── Login ──
async function handleLogin() {
  hideMsg('loginMsg');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showMsg('loginMsg', 'Please enter email and password', 'error');
    return;
  }

  setLoading('loginBtn', true);
  try {
    await WellpalAuth.login(email, password);
    showMsg('loginMsg', 'Login successful! Redirecting...', 'success');
    setTimeout(() => { window.location.href = 'wellpal-v5-updated (2).html'; }, 800);
  } catch(e) {
    showMsg('loginMsg', e.message || 'Login failed', 'error');
    setLoading('loginBtn', false);
  }
}

// ── Register ──
async function handleRegister() {
  hideMsg('regMsg');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;

  if (!name) { showMsg('regMsg', 'Please enter your name', 'error'); return; }
  if (!email) { showMsg('regMsg', 'Please enter your email', 'error'); return; }
  if (password.length < 6) { showMsg('regMsg', 'Password must be at least 6 characters', 'error'); return; }

  setLoading('regBtn', true);
  try {
    console.log('Starting signup for:', email);
    const result = await WellpalAuth.signup(email, password, name);
    console.log('Signup result:', JSON.stringify(result).substring(0, 500));

    // If needs_login flag (auto-login failed), switch to login tab
    if (result.needs_login) {
      showMsg('regMsg', 'Account created! Please sign in with your credentials.', 'success');
      setLoading('regBtn', false);
      setTimeout(() => {
        document.querySelector('.auth-tab[data-tab="login"]').click();
      }, 1500);
      return;
    }

    // If auto-confirmed (no email verification) — access_token will exist
    if (result.access_token || WellpalAuth.isLoggedIn()) {
      showMsg('regMsg', 'Account created! Saving health details...', 'success');

      // Collect optional health details
      const age = document.getElementById('regAge').value;
      const gender = document.getElementById('regGender').value;
      const height = document.getElementById('regHeight').value.trim();
      const weight = document.getElementById('regWeight').value.trim();
      const blood = document.getElementById('regBlood').value;
      const location = document.getElementById('regLocation').value.trim();
      const allergies = document.getElementById('regAllergies').value.trim();

      const extra = {};
      if (age) extra.age = parseInt(age);
      if (gender && gender !== 'Prefer not to say') extra.gender = gender;
      if (height) extra.height = height;
      if (weight) extra.weight = weight;
      if (blood && blood !== 'Unknown') extra.blood_type = blood;
      if (location) extra.location = location;
      if (allergies) extra.allergies = allergies.split(',').map(s => s.trim()).filter(Boolean);

      // Save extra health details to profile if any
      if (Object.keys(extra).length > 0) {
        try {
          const profile = await WellpalAuth.loadProfile();
          console.log('Profile loaded:', profile);
          if (profile && profile.id) {
            const patchRes = await fetch(`/api/profile?id=${profile.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(extra)
            });
            console.log('Profile patch status:', patchRes.status);
          }
        } catch(pe) {
          console.log('Profile update (non-critical):', pe);
        }
      }

      showMsg('regMsg', 'Account created! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'wellpal-v5-updated (2).html'; }, 1000);
    } else {
      // Email confirmation required
      showMsg('regMsg', 'Account created! Check your email for verification, then sign in.', 'success');
      setLoading('regBtn', false);
    }
  } catch(e) {
    console.error('Signup error:', e);
    showMsg('regMsg', e.message || 'Registration failed. Please try again.', 'error');
    setLoading('regBtn', false);
  }
}

// Enter key handlers
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
